<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat magique</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: Arial;
    background: linear-gradient(to bottom, #a6d7ff, #ffd6f6);
    transition: 1s;
}

/* nuit */
body.night {
    background: linear-gradient(to bottom, #05070d, #0b1a2a);
}

/* étoiles */
.star {
    position:absolute;
    width:2px;height:2px;
    background:white;
    border-radius:50%;
    opacity:0;
}
body.night .star {
    opacity:1;
}

/* chat */
#cat {
    font-size:60px;
    cursor:pointer;
}

/* centre */
.container {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
}

/* bouton */
button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>Chat magique 🐱</h1>
    <div id="cat">🐱</div>
    <div id="message"></div>
    <button onclick="toggleMode()">Jour / Nuit</button>
</div>

<script>
window.onload = function() {

    // étoiles
    for(let i=0;i<50;i++){
        let s=document.createElement("div");
        s.className="star";
        s.style.top=Math.random()*100+"vh";
        s.style.left=Math.random()*100+"vw";
        document.body.appendChild(s);
    }

    // messages
    const messages=[
        "Je suis là 🌙",
        "Respire ✨",
        "Tout va bien 💛",
        "Calme toi ☁️"
    ];

    document.getElementById("cat").onclick = function(){
        let m = messages[Math.floor(Math.random()*messages.length)];
        document.getElementById("message").textContent = m;
    }

}

// mode jour/nuit
function toggleMode(){
    document.body.classList.toggle("night");
}
</script>

</body>
</html>
